<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Appointments Scheduler</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <div class="logo-diamond"></div>
      <span>CAPMINDS</span>
    </div>
    <button class="btn-primary" onclick="openModal()">+ Book Appointment</button>
  </header>

  <!-- SIDEBAR + CONTENT -->
  <div class="wrapper">
    <aside class="sidebar">
      <nav>
        <a class="nav-link active" id="nav-calendar" onclick="showPage('calendar')">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          <span>Calendar</span>
        </a>
        <a class="nav-link" id="nav-dashboard" onclick="showPage('dashboard')">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>Dashboard</span>
        </a>
      </nav>
    </aside>

    <main class="main">

      <!-- CALENDAR PAGE -->
      <div class="page active" id="page-calendar">
        <div class="toolbar">
          <button class="icon-btn" onclick="changeMonth(-1)">&#8249;</button>
          <span class="month-label" id="month-label">January 2023</span>
          <button class="icon-btn" onclick="changeMonth(1)">&#8250;</button>
          <button class="btn-outline" onclick="goToday()">Today</button>
          <span class="view-tag">Month</span>
        </div>
        <p class="doctor-name" id="doctor-name">James Marry</p>
        <div class="calendar">
          <div class="cal-head" id="cal-head"></div>
          <div class="cal-body" id="cal-body"></div>
        </div>
      </div>

      <!-- DASHBOARD PAGE -->
      <div class="page" id="page-dashboard">
        <h2 class="page-title">Practice Dashboard</h2>
        <div class="filters">
          <input class="input" id="f-search-patient" placeholder="Patient Search" oninput="filterTable()" />
          <input class="input" id="f-search-doctor" placeholder="Doctor Search" oninput="filterTable()" />
          <input class="input" type="date" id="f-from" onchange="filterTable()" />
          <span>—</span>
          <input class="input" type="date" id="f-to" onchange="filterTable()" />
          <button class="btn-primary" onclick="filterTable()">Update</button>
        </div>
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Patient</th>
                <th>Doctor</th>
                <th>Hospital</th>
                <th>Specialty</th>
                <th>Date</th>
                <th>Time</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- MODAL -->
  <div class="overlay" id="overlay" onclick="overlayClose(event)">
    <div class="modal">
      <div class="modal-head">
        <h3>Schedule Appointment</h3>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="field">
            <label>Patient Name *</label>
            <select id="f-patient" class="input">
              <option value="">Select Patient</option>
              <option>Henry James</option>
              <option>Sarah Connor</option>
              <option>John Doe</option>
              <option>Emily Clark</option>
            </select>
            <span class="err" id="e-patient"></span>
          </div>
          <div class="field">
            <label>Doctor Name *</label>
            <select id="f-doctor" class="input">
              <option value="">Select Doctor</option>
              <option>James Marry</option>
              <option>Dr. Smith</option>
              <option>Dr. Patel</option>
              <option>Dr. Lee</option>
            </select>
            <span class="err" id="e-doctor"></span>
          </div>
          <div class="field">
            <label>Hospital Name *</label>
            <select id="f-hospital" class="input">
              <option value="">Select Hospital</option>
              <option>Salus Center</option>
              <option>Ultracare Hospital</option>
              <option>City Medical Center</option>
              <option>St. Mary's Hospital</option>
            </select>
            <span class="err" id="e-hospital"></span>
          </div>
          <div class="field">
            <label>Specialty *</label>
            <select id="f-specialty" class="input">
              <option value="">Select Specialty</option>
              <option>Dermatology</option>
              <option>Cardiology</option>
              <option>Orthopedics</option>
              <option>Neurology</option>
              <option>Pediatrics</option>
            </select>
            <span class="err" id="e-specialty"></span>
          </div>
          <div class="field">
            <label>Date *</label>
            <input type="date" id="f-date" class="input" />
            <span class="err" id="e-date"></span>
          </div>
          <div class="field">
            <label>Time *</label>
            <input type="time" id="f-time" class="input" />
            <span class="err" id="e-time"></span>
          </div>
          <div class="field full">
            <label>Reason</label>
            <textarea id="f-reason" class="input" rows="3" placeholder="Enter reason..."></textarea>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveAppointment()">Save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
